message Alf {
  AlfMessageType type = 1;
  string handling_id = 2;
  repeated google.protobuf.Struct references = 3;
  bool mention_alf_answered = 4;
}

message Meet {
  string id = 1;
  google.protobuf.Struct call = 2;
  MeetMode mode = 3;
  MessageMeetState state = 4;
  string country = 5;
  google.protobuf.Struct recording = 6;
  repeated string manager_ids = 7;
  string room_started_at = 8;
  repeated string amassed_persons = 9;
}

message MessageFile {
  string url = 1;
  string mime = 2;
  string file_name = 3;
}

message MessageThread {
  string id = 1;
  repeated string manager_ids = 2;
  int32 reply_count = 3;
  repeated string replied_manager_ids = 4;
}

message MessageButton {
  string title = 1;
  google.protobuf.Struct action = 2;
  MessageColorVariant color_variant = 3;
}

message CustomPayload {
  google.protobuf.Struct data = 1;
  google.protobuf.Struct param_mapper = 2;
}

message ChannelMessage {
  string id = 1;
  Alf alf = 2;
  google.protobuf.Struct log = 3;
  google.protobuf.Struct form = 4;
  Meet meet = 5;
  repeated MessageFile files = 6;
  MessageState state = 7;
  repeated google.protobuf.Struct blocks = 8;
  string chat_id = 9;
  MessageThread thread = 10;
  repeated MessageButton buttons = 11;
  repeated MessageOption options = 12;
  uint64 version = 13;
  google.protobuf.Struct web_page = 14;
  string chat_type = 15;
  string language = 16;
  string person_id = 17;
  string channel_id = 18;
  string created_at = 19;
  google.protobuf.Struct marketing = 20;
  string plain_text = 21;
  repeated google.protobuf.Struct reactions = 22;
  string request_id = 23;
  string updated_at = 24;
  MessageAlertLevel alert_level = 25;
  string person_type = 26;
  google.protobuf.Struct support_bot = 27;
  WritingType writing_type = 28;
  CustomPayload custom_payload = 29;
  string inbound_email_id = 30;
  string error_code = 31;
}

message PrebuiltMessage {
  string id = 1;
  repeated MessageFile files = 2;
  repeated google.protobuf.Struct blocks = 3;
  string chat_id = 4;
  repeated google.protobuf.Struct buttons = 5;
  uint64 version = 6;
  string chat_type = 7;
  string language = 8;
  string person_id = 9;
  string channel_id = 10;
  string created_at = 11;
  string plain_text = 12;
  string request_id = 13;
  string updated_at = 14;
  string person_type = 15;
  WritingType writing_type = 16;
  CustomPayload custom_payload = 17;
}

