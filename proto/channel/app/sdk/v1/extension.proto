// OrderAddress represents a recipient/shipping address.
// The recipient's display name is `first_name` + `last_name` joined per locale.
// Providers that do not support name splitting should put the full name in `last_name`.
message OrderAddress {
  string first_name = 1;
  string last_name = 2;
  string phone_number = 3;
  string email = 4;
  string cell_phone_number = 5;
  string zipcode = 6;
  string address1 = 7;
  string address2 = 8;
  string shipping_message = 9;
  string country = 10;
  string city = 11;
  string province = 12;
}

