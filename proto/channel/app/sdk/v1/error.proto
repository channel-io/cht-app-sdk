syntax = "proto3";

package channel.app.sdk.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/channel-io/app-sdk/go/internal/gen/channel/app/sdk/v1;sdkv1";

message FunctionError {
  int32 code = 1;
  string type = 2;
  string message = 3;
  google.protobuf.Value data = 4;
}
