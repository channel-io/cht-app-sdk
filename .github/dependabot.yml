version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/ts"
    schedule:
      interval: "weekly"
    groups:
      typescript-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/ts/examples/basic"
    schedule:
      interval: "weekly"
    groups:
      basic-example-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/ts/examples/calendar"
    schedule:
      interval: "weekly"
    groups:
      calendar-example-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
