name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-content:
    name: Public content policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check public content policy
        run: ./scripts/check-public-content.sh

      - name: Scan the repository for secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.28.0
          detect --source=/repo --no-git --redact

  lint:
    name: Lint, Format & Proto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "ts/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "ts/pnpm-lock.yaml"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go/go.mod"
          cache-dependency-path: "go/go.sum"

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.54.0"

      - name: Install TypeScript dependencies
        working-directory: ts
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Generated proto check
        run: make proto-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "ts/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "ts/pnpm-lock.yaml"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go/go.mod"
          cache-dependency-path: "go/go.sum"

      - name: Install TypeScript dependencies
        working-directory: ts
        run: pnpm install --frozen-lockfile

      - name: Build
        run: make build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "ts/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "ts/pnpm-lock.yaml"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go/go.mod"
          cache-dependency-path: "go/go.sum"

      - name: Install TypeScript dependencies
        working-directory: ts
        run: pnpm install --frozen-lockfile

      - name: Test
        run: make test
