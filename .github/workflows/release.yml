name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-release
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: "ts/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "ts/pnpm-lock.yaml"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: ts
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ts
        run: pnpm build

      - name: Verify publishable package contents
        working-directory: ts
        run: |
          mkdir -p /tmp/npm-packs
          pnpm --dir packages/cli pack --pack-destination /tmp/npm-packs
          pnpm --dir packages/core pack --pack-destination /tmp/npm-packs
          pnpm --dir packages/server pack --pack-destination /tmp/npm-packs
          pnpm --dir packages/wam pack --pack-destination /tmp/npm-packs
          pnpm --dir packages/wam-ui pack --pack-destination /tmp/npm-packs

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          cwd: ts
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Request review from the merger
        if: steps.changesets.outputs.pullRequestNumber != ''
        uses: actions/github-script@v9
        env:
          RELEASE_PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releasePullNumber = Number(
              process.env.RELEASE_PULL_REQUEST_NUMBER,
            )

            const { data: associatedPulls } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              })

            const mergedPull = associatedPulls
              .filter((pull) => pull.merged_at)
              .sort(
                (left, right) =>
                  new Date(right.merged_at) - new Date(left.merged_at),
              )[0]

            if (!mergedPull) {
              core.warning(`No merged pull request found for ${context.sha}`)
              return
            }

            const { data: sourcePull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: mergedPull.number,
            })
            const reviewer = sourcePull.merged_by?.login

            if (!reviewer || reviewer.endsWith('[bot]')) {
              core.warning('The merge actor cannot be requested as a reviewer')
              return
            }

            const { data: releasePull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: releasePullNumber,
            })
            const requestedReviewers = releasePull.requested_reviewers.map(
              ({ login }) => login,
            )
            const reviewersToRemove = requestedReviewers.filter(
              (login) => login !== reviewer,
            )

            if (reviewersToRemove.length > 0) {
              await github.rest.pulls.removeRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: releasePullNumber,
                reviewers: reviewersToRemove,
              })
            }

            if (!requestedReviewers.includes(reviewer)) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: releasePullNumber,
                reviewers: [reviewer],
              })
            }
